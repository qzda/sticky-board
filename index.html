<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (() => {
      const lang = navigator.language.toLowerCase();
      document.documentElement.lang = lang.startsWith("zh") ? "zh" : "en";
    })();
  </script>
  <title>Sticky Board</title>
  <meta name="description"
    content="Sticky Board is a clean local-first sticky notes app with Markdown, drag-and-drop, and grid snapping. No account, no sync, just open and use. 一个简洁的本地优先便签应用，支持 Markdown、拖拽和网格吸附；无需账号、无需同步，打开即用。" />
  <meta name="author" content="qzda" />
  <link rel="canonical" href="https://sticky-web.netlify.app/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sticky-web.netlify.app/" />
  <meta property="og:title" content="Sticky Board - Local-First Markdown Sticky Notes" />
  <meta property="og:description"
    content="Sticky Board is a clean local-first sticky notes app with Markdown, drag-and-drop, and grid snapping. No account, no sync, just open and use. 一个简洁的本地优先便签应用，支持 Markdown、拖拽和网格吸附；无需账号、无需同步，打开即用。" />
  <meta property="og:image" content="https://sticky-web.netlify.app/og-image.png" />
  <meta property="og:site_name" content="Sticky Board" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sticky Board - Local-First Markdown Sticky Notes" />
  <meta name="twitter:description"
    content="Sticky Board is a clean local-first sticky notes app with Markdown, drag-and-drop, and grid snapping. No account, no sync, just open and use. 一个简洁的本地优先便签应用，支持 Markdown、拖拽和网格吸附；无需账号、无需同步，打开即用。" />
  <meta name="twitter:image" content="https://sticky-web.netlify.app/og-image.png" />
  <meta name="twitter:creator" content="@qinzhidaoa" />

  <!-- Additional SEO -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#171717" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sticky Board" />

  <link rel="manifest" href="/manifest.json" />

  <style>
    :root {
      font-family: system-ui;
      line-height: 1.5;
      font-weight: 400;

      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;

      color-scheme: light dark;
      --bg: #ffffff;
      --color: #171717;
      --color-card: #171717;
      --bg-card: #ffffaa;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #4e4e4e;
        --color: #ffffff;
        --bg-card: #ebeb54;
      }
    }

    * {
      box-sizing: border-box;
      color: var(--color);
    }

    body {
      width: 100dvw;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--color);
    }

    body.move {
      user-select: none;
    }

    #root {
      height: 100%;
      overflow: hidden;

      /* 点阵背景 */
      background-image: radial-gradient(gray 1px, transparent 1px);
      background-size: 1rem 1rem;
      background-position: 0.5rem 0.5rem;
    }
  </style>

  <link rel="stylesheet" href="/src/style.scss">
</head>

<body>
  <div id="root">
    <noscript>noscript</noscript>
  </div>

  <div id="settings"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
